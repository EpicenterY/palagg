<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PÅLÄGG Dependency Graph</title>
    <script type="module" src="/src/dependency-graph.ts"></script>
  </head>
  <body>
    <main>
      <header>
        <h1>PÅLÄGG Dependency Graph</h1>
        <p>
          Module-level dependency map for the app. Local source files and key
          external packages are shown.
        </p>
      </header>

      <section>
        <div id="graph-toolbar" aria-label="Graph zoom controls">
          <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
          <button id="zoom-out" type="button" aria-label="Zoom out">-</button>
          <button id="zoom-reset" type="button" aria-label="Reset zoom">
            Reset
          </button>
        </div>
        <div id="graph" aria-label="Dependency graph"></div>
      </section>
    </main>
  </body>
</html>
