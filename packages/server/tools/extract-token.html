<!DOCTYPE html>
<html>
<head>
<title>Bambu Cloud Token Extractor</title>
<style>
body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
.step { margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 8px; }
textarea { width: 100%; height: 60px; font-family: monospace; font-size: 12px; }
button { padding: 10px 20px; background: #36583D; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
button:hover { background: #2a4630; }
.success { color: green; font-weight: bold; }
.error { color: red; }
code { background: #e8e8e8; padding: 2px 6px; border-radius: 3px; }
</style>
</head>
<body>
<h1>Bambu Cloud Token Extractor</h1>
<div class="step">
<h3>Step 1</h3>
<p>Open <a href="https://bambulab.com" target="_blank">bambulab.com</a> and log in with your Google account.</p>
</div>
<div class="step">
<h3>Step 2</h3>
<p>After logging in, open the browser console (F12 → Console tab) and paste this:</p>
<code>JSON.parse(localStorage.getItem('token')).accessToken</code>
<p>Copy the result and paste it below:</p>
<textarea id="token" placeholder="Paste your access token here..."></textarea>
</div>
<div class="step">
<h3>Step 3</h3>
<button onclick="saveToken()">Save Token to Server</button>
<p id="status"></p>
</div>
<script>
async function saveToken() {
  const token = document.getElementById('token').value.trim().replace(/^["']|["']$/g, '');
  if (!token) {
    document.getElementById('status').innerHTML = '<span class="error">Please paste your token first</span>';
    return;
  }
  try {
    const res = await fetch('/api/config/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessToken: token })
    });
    if (res.ok) {
      document.getElementById('status').innerHTML = '<span class="success">Token saved! Server will reconnect to Bambu Cloud.</span>';
    } else {
      document.getElementById('status').innerHTML = '<span class="error">Failed to save: ' + (await res.text()) + '</span>';
    }
  } catch(e) {
    document.getElementById('status').innerHTML = '<span class="error">Error: ' + e.message + '</span>';
  }
}
</script>
</body>
</html>
